stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/loan_data.csv
    params:
      - prepare.test_size
      - prepare.random_state
      - prepare.target_column
    outs:
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv
      - data/processed/preprocessor.joblib

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/X_train.csv
      - data/processed/y_train.csv
      - data/processed/preprocessor.joblib
    params:
      - train.n_estimators
      - train.max_depth
      - train.min_samples_split
      - train.min_samples_leaf
      - train.random_state
      - train.class_weight
    outs:
      - models/loan_risk_model.joblib

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/loan_risk_model.joblib
      - data/processed/X_test.csv
      - data/processed/y_test.csv
    metrics:
      - reports/metrics.json:
          cache: false
    plots:
      - reports/confusion_matrix.json:
          cache: false
